<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BakeConvert</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', 'system-ui', 'sans-serif']
      }
    }
  }
}
</script>

<style>
/* Subtle press feedback */
.pressable {
  transition: all 0.12s ease;
}
.pressable:active {
  transform: scale(0.97);
  opacity: 0.9;
}

/* Result settle animation */
@keyframes settle {
  0% { transform: scale(0.97); opacity: 0.6; }
  100% { transform: scale(1); opacity: 1; }
}
.settle {
  animation: settle 0.18s ease;
}
</style>
</head>

<body class="bg-[#fdfcf9] font-sans h-[100dvh] overflow-hidden text-amber-950">

<div x-data="bakeConvert()" class="max-w-md mx-auto h-full flex flex-col px-5 py-5">

  <!-- HEADER (quiet) -->
  <header class="flex justify-between items-center mb-4">
    <h1 class="text-lg font-semibold tracking-tight opacity-80">BakeConvert</h1>

    <button @click="installPrompt()"
      class="text-xs px-3 py-1.5 rounded-full bg-amber-100 text-amber-800 pressable">
      Install
    </button>
  </header>

  <!-- TABS (minimal) -->
  <div class="flex justify-center mb-4 text-sm">
    <button @click="activeTab='single'"
      :class="activeTab==='single' ? 'opacity-100' : 'opacity-40'"
      class="px-4 py-1 font-medium pressable">
      Ingredient
    </button>

    <button @click="activeTab='recipe'"
      :class="activeTab==='recipe' ? 'opacity-100' : 'opacity-40'"
      class="px-4 py-1 font-medium pressable">
      Recipe
    </button>
  </div>

  <!-- MAIN -->
  <div x-show="activeTab==='single'" class="flex-1 flex flex-col justify-between">

    <!-- INPUT ZONE -->
    <div>

      <!-- Ingredient (quiet context) -->
      <select x-model="selectedIngredient" @change="updateResult()"
        class="w-full mb-4 text-sm bg-transparent border-b border-amber-200 pb-2 focus:outline-none">
        <template x-for="ing in ingredients" :key="ing.name">
          <option :value="ing.name" x-text="ing.name"></option>
        </template>
      </select>

      <!-- FROM / TO unified -->
      <div class="grid grid-cols-2 gap-4">

        <!-- FROM -->
        <div>
          <input x-model.number="amount1" @input="updateResult()"
            type="number" step="0.1"
            class="w-full text-3xl font-semibold bg-transparent focus:outline-none">

          <select x-model="unit1" @change="updateResult()"
            class="w-full text-sm mt-1 bg-transparent text-amber-700 focus:outline-none">
            <option value="grams">grams</option>
            <option value="cups">cups</option>
            <option value="tbsp">tbsp</option>
            <option value="tsp">tsp</option>
            <option value="oz">oz</option>
            <option value="ml">ml</option>
          </select>
        </div>

        <!-- TO -->
        <div>
          <input x-model.number="amount2" @input="updateResult()"
            type="number" step="0.1"
            class="w-full text-3xl font-semibold bg-transparent focus:outline-none">

          <select x-model="unit2" @change="updateResult()"
            class="w-full text-sm mt-1 bg-transparent text-amber-700 focus:outline-none">
            <option value="grams">grams</option>
            <option value="cups">cups</option>
            <option value="tbsp">tbsp</option>
            <option value="tsp">tsp</option>
            <option value="oz">oz</option>
            <option value="ml">ml</option>
          </select>
        </div>

      </div>

      <!-- Swap (utility) -->
      <div class="flex justify-center mt-4">
        <button @click="swapUnits()"
          class="text-xl opacity-50 pressable">
          ↔
        </button>
      </div>

    </div>

    <!-- RESULT (hero) -->
    <div class="text-center mt-6">
      <div class="text-5xl font-semibold tracking-tight settle"
           x-text="resultText || '—'"></div>
    </div>

  </div>

  <!-- RECIPE -->
  <div x-show="activeTab==='recipe'" class="flex-1 flex items-center justify-center text-sm opacity-50">
    Recipe scaling coming soon
  </div>

</div>

<script>
function bakeConvert() {
  return {
    activeTab: 'single',

    ingredients: [
      { name: "All-Purpose Flour", gPerCup: 120, isLiquid: false },
      { name: "Bread Flour", gPerCup: 120, isLiquid: false },
      { name: "Cake Flour", gPerCup: 113, isLiquid: false },
      { name: "Whole Wheat Flour", gPerCup: 120, isLiquid: false },
      { name: "Almond Flour", gPerCup: 96, isLiquid: false },
      { name: "Granulated Sugar", gPerCup: 200, isLiquid: false },
      { name: "Brown Sugar", gPerCup: 213, isLiquid: false },
      { name: "Butter", gPerCup: 227, isLiquid: true },
      { name: "Milk", gPerCup: 242, isLiquid: true },
      { name: "Honey", gPerCup: 336, isLiquid: true }
    ],

    selectedIngredient: "All-Purpose Flour",
    amount1: 100,
    amount2: 0,
    unit1: "grams",
    unit2: "cups",
    resultText: "",

    ML_PER_CUP: 236.6,
    TBSP_PER_CUP: 16,
    TSP_PER_CUP: 48,
    OZ_PER_GRAM: 0.035274,

    init() {
      this.updateResult();
    },

    updateResult() {
      const ing = this.ingredients.find(i => i.name === this.selectedIngredient);
      if (!ing || !this.amount1 || this.amount1 <= 0) {
        this.resultText = "—";
        return;
      }

      let grams = this.toGrams(this.amount1, this.unit1, ing);
      let converted = this.fromGrams(grams, this.unit2, ing);

      this.amount2 = Number(converted.toFixed(2));
      this.resultText = `${this.amount2} ${this.unit2}`;
    },

    toGrams(amount, unit, ing) {
      switch(unit){
        case "grams": return amount;
        case "cups": return amount * ing.gPerCup;
        case "tbsp": return amount * (ing.gPerCup / this.TBSP_PER_CUP);
        case "tsp": return amount * (ing.gPerCup / this.TSP_PER_CUP);
        case "oz": return amount / this.OZ_PER_GRAM;
        case "ml": return amount * (ing.gPerCup / this.ML_PER_CUP);
      }
    },

    fromGrams(grams, unit, ing) {
      switch(unit){
        case "grams": return grams;
        case "cups": return grams / ing.gPerCup;
        case "tbsp": return grams / (ing.gPerCup / this.TBSP_PER_CUP);
        case "tsp": return grams / (ing.gPerCup / this.TSP_PER_CUP);
        case "oz": return grams * this.OZ_PER_GRAM;
        case "ml": return grams / (ing.gPerCup / this.ML_PER_CUP);
      }
    },

    swapUnits() {
      [this.unit1, this.unit2] = [this.unit2, this.unit1];
      [this.amount1, this.amount2] = [this.amount2, this.amount1];
      this.updateResult();
    },

    installPrompt() {
      alert("PWA install prompt here");
    }
  }
}
</script>

</body>
</html>
