<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BakeConvert</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
  .pressable {
    transition: all 0.12s ease;
  }
  .pressable:active {
    transform: scale(0.98);
    opacity: 0.85;
  }
  @keyframes settle {
    0% { transform: translateY(3px); opacity: 0.6; }
    100% { transform: translateY(0); opacity: 1; }
  }
  .settle {
    animation: settle 0.18s ease;
  }
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }
  .no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
</style>
</head>
<body class="bg-[#fbfaf7] min-h-[100dvh] text-amber-950 pb-10">
<div x-data="bakeConvert()" class="max-w-md mx-auto flex flex-col px-6 py-4 space-y-3">
  
  <!-- 1. HEADER -->
  <header class="text-left px-1">
    <h1 class="text-sm font-medium tracking-tight opacity-40">BakeConvert</h1>
  </header>

  <!-- 2. INGREDIENT CARD -->
  <div class="bg-white rounded-2xl shadow-sm border border-amber-100 p-3">
    <div class="text-[9px] text-amber-600 mb-1 tracking-[0.2em] font-bold uppercase">Ingredient</div>
    <select x-model="selectedIngredient" @change="onIngredientChange()"
      class="w-full text-xl font-bold bg-transparent focus:outline-none appearance-none text-amber-950 cursor-pointer">
      <template x-for="ing in ingredients" :key="ing.name">
        <option :value="ing.name" x-text="ing.name"></option>
      </template>
    </select>
  </div>

  <!-- 3. THE INPUT BOX -->
  <div class="flex flex-col space-y-2">
    <!-- Row 1: Stepper -->
    <div class="flex items-center justify-between bg-white rounded-3xl p-1 border border-amber-100 shadow-sm">
      <button @pointerdown="startAdjustment('from', -1)" @pointerup="stopAdjustment()" @pointerleave="stopAdjustment()"
        class="w-16 h-16 flex items-center justify-center bg-amber-50 rounded-full text-3xl font-bold text-amber-800 pressable select-none">
        −
      </button>
      
      <div class="flex-1 text-center">
        <span class="text-7xl font-black tracking-tighter text-amber-950" x-text="amount1"></span>
      </div>

      <button @pointerdown="startAdjustment('from', 1)" @pointerup="stopAdjustment()" @pointerleave="stopAdjustment()"
        class="w-16 h-16 flex items-center justify-center bg-amber-50 rounded-full text-3xl font-bold text-amber-800 pressable select-none">
        +
      </button>
    </div>

    <!-- Row 2: Scrolling Pills -->
    <div class="flex overflow-x-auto gap-1 py-1 no-scrollbar">
      <template x-for="u in units" :key="u">
        <button @click="unit1 = u; updateResult('from')"
          :class="unit1 === u ? 'bg-amber-800 text-white shadow-md' : 'bg-white text-amber-700 border border-amber-100'"
          class="px-5 py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all pressable whitespace-nowrap min-h-[64px] min-w-[90px]"
          x-text="u">
        </button>
      </template>
    </div>
  </div>

  <!-- 4. THE DIVIDER -->
  <div class="flex items-center justify-center gap-4 py-0">
    <div class="text-amber-300 font-black text-xl tracking-tighter">↓</div>
    <button @click="swapUnits()" class="w-8 h-8 flex items-center justify-center bg-white border border-amber-100 rounded-lg text-amber-800 shadow-sm pressable">
      ↔
    </button>
    <div class="text-[9px] font-black text-amber-400 uppercase tracking-[0.2em]">Converts To</div>
  </div>

  <!-- 5. THE RESULT BOX -->
  <div class="bg-amber-900 rounded-[2.5rem] p-5 shadow-2xl flex flex-col items-center text-white space-y-4">
    <!-- Row 1: Scrolling Pills -->
    <div class="flex overflow-x-auto gap-1 py-1 no-scrollbar w-full">
      <template x-for="u in units" :key="u">
        <button @click="unit2 = u; updateResult('from')"
          :class="unit2 === u ? 'bg-white text-amber-900' : 'bg-amber-800/50 text-amber-100 border border-amber-700'"
          class="px-5 py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all pressable whitespace-nowrap min-h-[64px] min-w-[90px]"
          x-text="u">
        </button>
      </template>
    </div>

    <!-- Row 2: Result Text -->
    <div class="flex flex-col items-center text-center w-full">
      <div class="text-8xl font-black tracking-tighter settle leading-none" x-text="amount2 || '0'"></div>
      <div class="text-amber-400 font-bold uppercase tracking-[0.3em] text-[10px] mt-2" x-text="unit2"></div>
    </div>
  </div>
</div>

<script>
function bakeConvert() {
  return {
    ingredients: [
      { name: "All-Purpose Flour", gPerCup: 120, type: "dry" },
      { name: "Bread Flour", gPerCup: 120, type: "dry" },
      { name: "Cake Flour", gPerCup: 113, type: "dry" },
      { name: "Granulated Sugar", gPerCup: 200, type: "dry" },
      { name: "Brown Sugar (packed)", gPerCup: 213, type: "dry" },
      { name: "Powdered Sugar", gPerCup: 120, type: "dry" },
      { name: "Cocoa Powder", gPerCup: 120, type: "dry" },
      { name: "Rolled Oats", gPerCup: 95, type: "dry" },
      { name: "Butter", gPerCup: 227, type: "fat" },
      { name: "Milk", gPerCup: 242, type: "liquid" }
    ],

    units: ["grams", "cups", "tbsp", "tsp", "oz", "ml"],

    selectedIngredient: "All-Purpose Flour",
    amount1: 100,
    amount2: 0,
    unit1: "grams",
    unit2: "cups",

    resultText: "",

    holdTimer: null,
    holdInterval: null,

    // Constants
    ML_PER_CUP: 236.6,
    TBSP_PER_CUP: 16,
    TSP_PER_CUP: 48,
    OZ_PER_GRAM: 0.035274,

    init() {
      this.onIngredientChange();
    },

    onIngredientChange() {
      const ing = this.ingredients.find(i => i.name === this.selectedIngredient);
      if (!ing) return;

      // Smart default units
      if (ing.type === "liquid") {
        this.unit1 = "ml";
        this.unit2 = "cups";
      } else {
        this.unit1 = "grams";
        this.unit2 = "cups";
      }

      this.updateResult('from');
    },

    updateResult(source = 'from') {
      const ing = this.ingredients.find(i => i.name === this.selectedIngredient);
      if (!ing) return;

      // Prevent invalid input
      if (source === 'from' && (!this.amount1 || this.amount1 <= 0)) {
        this.amount2 = 0;
        this.resultText = "—";
        return;
      }
      if (source === 'to' && (!this.amount2 || this.amount2 <= 0)) {
        this.amount1 = 0;
        this.resultText = "—";
        return;
      }

      let grams = 0;

      if (source === 'from') {
        grams = this.toGrams(this.amount1, this.unit1, ing);
        const out = this.fromGrams(grams, this.unit2, ing);
        this.amount2 = this.roundResult(out, this.unit2);
      } else {
        grams = this.toGrams(this.amount2, this.unit2, ing);
        const out = this.fromGrams(grams, this.unit1, ing);
        this.amount1 = this.roundResult(out, this.unit1);
      }

      this.resultText = `${this.amount2} ${this.unit2}`;
    },

    roundResult(value, unit) {
      if (unit === "tsp" || unit === "tbsp") return Number(value.toFixed(2));
      if (unit === "grams" || unit === "ml") return Number(value.toFixed(1));
      return Number(value.toFixed(2));
    },

    toGrams(amount, unit, ing) {
      switch(unit) {
        case "grams": return amount;
        case "cups": return amount * ing.gPerCup;
        case "tbsp": return amount * (ing.gPerCup / this.TBSP_PER_CUP);
        case "tsp": return amount * (ing.gPerCup / this.TSP_PER_CUP);
        case "oz": return amount / this.OZ_PER_GRAM;
        case "ml": return amount * (ing.gPerCup / this.ML_PER_CUP);
        default: return amount;
      }
    },

    fromGrams(grams, unit, ing) {
      switch(unit) {
        case "grams": return grams;
        case "cups": return grams / ing.gPerCup;
        case "tbsp": return grams / (ing.gPerCup / this.TBSP_PER_CUP);
        case "tsp": return grams / (ing.gPerCup / this.TSP_PER_CUP);
        case "oz": return grams * this.OZ_PER_GRAM;
        case "ml": return grams / (ing.gPerCup / this.ML_PER_CUP);
        default: return grams;
      }
    },

    swapUnits() {
      [this.unit1, this.unit2] = [this.unit2, this.unit1];
      [this.amount1, this.amount2] = [this.amount2, this.amount1];
      this.updateResult('from'); // Recalculate from the new "from" side
    },

    startAdjustment(source, direction) {
      this.adjust(source, direction); // Initial tap
      
      // Wait 400ms then start rapid firing
      this.holdTimer = setTimeout(() => {
        this.holdInterval = setInterval(() => {
          this.adjust(source, direction);
        }, 50); 
      }, 400);
    },

    stopAdjustment() {
      clearTimeout(this.holdTimer);
      clearInterval(this.holdInterval);
    },

    adjust(source, direction) {
      const isWhole = this.unit1 === 'grams' || this.unit1 === 'ml';
      const step = isWhole ? 1 : 0.1;
      if (source === 'from') {
        const newVal = this.amount1 + (direction * step);
        this.amount1 = Math.max(0, Number(newVal.toFixed(isWhole ? 0 : 1)));
        this.updateResult('from');
      }
    }
  }
}
</script>
</body>
</html>
